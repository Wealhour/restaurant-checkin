<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Check-in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f2f2f7;
      color: #1c1c1e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 64px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 {
      font-size: clamp(1.4rem, 4vw, 1.75rem);
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #1c1c1e;
    }
    header #date {
      margin-top: 4px;
      font-size: 0.95rem;
      color: #8e8e93;
      font-weight: 400;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    /* ── Name form ── */
    #formContainer {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0;
    }
    #nameInput {
      flex: 1;
      font-size: 1rem;
      font-family: inherit;
      color: #1c1c1e;
      padding: 14px 18px;
      border: none;
      outline: none;
      background: transparent;
      min-width: 0;
    }
    #nameInput::placeholder { color: #c7c7cc; }
    #submitButton {
      flex-shrink: 0;
      padding: 14px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      color: #007aff;
      background: none;
      border: none;
      cursor: pointer;
    }
    #submitButton:active { opacity: 0.7; }

    /* ── Participant list ── */
    #nameList {
      list-style: none;
      width: 100%;
      max-width: 480px;
      margin-top: 12px;
    }
    #nameList li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      font-size: 0.95rem;
      font-weight: 500;
    }
    .remove-button {
      font-size: 0.8rem;
      font-weight: 600;
      font-family: inherit;
      color: #ff3b30;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 0;
      flex-shrink: 0;
    }
    .remove-button:active { opacity: 0.7; }

    /* ── Responsive tweaks ── */
    @media (max-width: 360px) {
      body { padding: 32px 12px 48px; }
      header h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Student Restaurant</h1>
    <div id="date"></div>
  </header>

  <div class="card">
    <div id="formContainer">
      <input type="text" id="nameInput" placeholder="Your name" aria-label="Your name" autocomplete="off">
      <button id="submitButton">Join</button>
    </div>
  </div>

  <ul id="nameList"></ul>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBtUnTFpQgtM8wpPEGrU8ZNVr4CpLKehHU",
      authDomain: "restaurant-cran.firebaseapp.com",
      projectId: "restaurant-cran",
      storageBucket: "restaurant-cran.firebasestorage.app",
      messagingSenderId: "637517186100",
      appId: "1:637517186100:web:25bcb0ea440dd281ec7661",
      measurementId: "G-8YP5YS536H",
      databaseURL: "https://restaurant-cran-default-rtdb.europe-west1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const today = new Date().toISOString().split('T')[0];

    // Date display
    document.getElementById('date').textContent = new Date().toLocaleDateString(undefined, {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    const nameInput    = document.getElementById('nameInput');
    const nameList     = document.getElementById('nameList');
    const submitButton = document.getElementById('submitButton');
    const listRef      = ref(database, 'restaurant-checkin/' + today);

    // ── Participant list ──
    const addNameToList = (name, key) => {
      const li = document.createElement('li');
      li.dataset.key = key;

      const span = document.createElement('span');
      span.textContent = name;

      const removeBtn = document.createElement('button');
      removeBtn.textContent = 'Remove';
      removeBtn.className = 'remove-button';
      removeBtn.addEventListener('click', () => {
        if (confirm('Remove your name?')) {
          remove(ref(database, 'restaurant-checkin/' + today + '/' + key));
        }
      });

      li.appendChild(span);
      li.appendChild(removeBtn);
      nameList.appendChild(li);
    };

    onChildAdded(listRef, (snapshot) => addNameToList(snapshot.val(), snapshot.key));

    onChildRemoved(listRef, (snapshot) => {
      const li = nameList.querySelector(`li[data-key='${snapshot.key}']`);
      if (li) li.remove();
    });

    const submitName = () => {
      const name = nameInput.value.trim();
      if (name) {
        push(listRef, name);
        nameInput.value = '';
      }
    };

    submitButton.addEventListener('click', submitName);
    nameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') submitName(); });
  </script>
</body>
</html>
