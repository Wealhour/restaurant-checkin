<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Check-in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f2f2f7;
      color: #1c1c1e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 64px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 {
      font-size: clamp(1.4rem, 4vw, 1.75rem);
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #1c1c1e;
    }
    header #date {
      margin-top: 4px;
      font-size: 0.95rem;
      color: #8e8e93;
      font-weight: 400;
    }

    /* ── Weather widget ── */
    .weather-widget {
      position: fixed;
      top: 16px;
      right: 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      backdrop-filter: blur(8px);
      color: #1c1c1e;
      z-index: 2;
      min-width: 170px;
    }
    .weather-icon { font-size: 1.25rem; }
    .weather-temp { font-weight: 700; font-size: 1.05rem; }
    .weather-meta { font-size: 0.85rem; color: #6b7280; line-height: 1.2; }
    .weather-meta strong { color: #1c1c1e; font-weight: 600; }
    .weather-widget.is-muted { color: #8e8e93; }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    /* ── Name form ── */
    #formContainer {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0;
    }
    #nameInput {
      flex: 1;
      font-size: 1rem;
      font-family: inherit;
      color: #1c1c1e;
      padding: 14px 18px;
      border: none;
      outline: none;
      background: transparent;
      min-width: 0;
    }
    #nameInput::placeholder { color: #c7c7cc; }
    #submitButton {
      flex-shrink: 0;
      padding: 14px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      color: #007aff;
      background: none;
      border: none;
      cursor: pointer;
    }
    #submitButton:active { opacity: 0.7; }

    /* ── Participant list ── */
    #nameList {
      list-style: none;
      width: 100%;
      max-width: 480px;
      margin-top: 12px;
    }
    #nameList li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      font-size: 0.95rem;
      font-weight: 500;
    }
    .remove-button {
      font-size: 0.8rem;
      font-weight: 600;
      font-family: inherit;
      color: #ff3b30;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 0;
      flex-shrink: 0;
    }
    .remove-button:active { opacity: 0.7; }

    /* ── Daily menu ── */
    .menu-card {
      width: 100%;
      max-width: 480px;
      margin-top: 18px;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 16px 18px;
    }
    .menu-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #1c1c1e;
    }
    .menu-subtitle {
      font-size: 0.85rem;
      color: #8e8e93;
      margin-bottom: 10px;
    }
    .menu-section + .menu-section {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #ececf1;
    }
    .menu-section h3 {
      font-size: 0.92rem;
      margin-bottom: 6px;
      color: #1c1c1e;
    }
    .menu-items {
      margin-left: 18px;
      color: #3a3a3c;
      font-size: 0.9rem;
      line-height: 1.4;
    }
    .menu-items li + li { margin-top: 3px; }
    .menu-empty {
      color: #8e8e93;
      font-size: 0.9rem;
    }

    /* ── Responsive tweaks ── */
    @media (max-width: 360px) {
      body { padding: 32px 12px 48px; }
      header h1 { font-size: 1.3rem; }
    }
    @media (max-width: 600px) {
      .weather-widget {
        position: static;
        width: 100%;
        max-width: 480px;
        margin-bottom: 12px;
        align-self: center;
      }
    }
  </style>
</head>
<body>
  <div
    id="weatherWidget"
    class="weather-widget"
    role="group"
    aria-label="Current weather conditions"
  >
    <span id="weatherIcon" class="weather-icon" aria-hidden="true">⛅️</span>
    <div>
      <div id="weatherTemp" class="weather-temp">--°C</div>
      <div id="weatherMeta" class="weather-meta" aria-live="polite">
        <strong id="weatherLocation">Brabois, Nancy</strong>
        <span aria-hidden="true"> · </span>
        <span id="weatherDescription">Loading...</span>
      </div>
    </div>
  </div>
  <header>
    <h1>Student Restaurant</h1>
    <div id="date"></div>
  </header>

  <div class="card">
    <div id="formContainer">
      <input type="text" id="nameInput" placeholder="Your name" aria-label="Your name" autocomplete="off">
      <button id="submitButton">Join</button>
    </div>
  </div>

  <ul id="nameList"></ul>
  <section class="menu-card" aria-live="polite">
    <h2 class="menu-title">Today’s Lunch Menu</h2>
    <p id="menuSubtitle" class="menu-subtitle">Loading daily menu...</p>
    <div id="menuContent" class="menu-empty"></div>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBtUnTFpQgtM8wpPEGrU8ZNVr4CpLKehHU",
      authDomain: "restaurant-cran.firebaseapp.com",
      projectId: "restaurant-cran",
      storageBucket: "restaurant-cran.firebasestorage.app",
      messagingSenderId: "637517186100",
      appId: "1:637517186100:web:25bcb0ea440dd281ec7661",
      measurementId: "G-8YP5YS536H",
      databaseURL: "https://restaurant-cran-default-rtdb.europe-west1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const today = new Date().toISOString().split('T')[0];

    // Date display
    document.getElementById('date').textContent = new Date().toLocaleDateString(undefined, {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    // Weather widget
    const weatherWidget = document.getElementById('weatherWidget');
    const weatherTemp   = document.getElementById('weatherTemp');
    const weatherLocation = document.getElementById('weatherLocation');
    const weatherDescription = document.getElementById('weatherDescription');
    const weatherIcon   = document.getElementById('weatherIcon');

    const WEATHER_FETCH_TIMEOUT_MILLISECONDS = 8000; // Abort request quickly to keep the page responsive on slow networks
    const WEATHER_LOCATION = { name: 'Brabois, Nancy', latitude: 48.6937, longitude: 6.1834 };
    const WEATHER_API_URL = `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LOCATION.latitude}&longitude=${WEATHER_LOCATION.longitude}&current=temperature_2m,weather_code,is_day&timezone=auto`;
    const MENU_FETCH_TIMEOUT_MILLISECONDS = 6000;
    const MENU_DISPLAY_NAME = 'CROUS Space Brabois';
    const MENU_RESTAURANT_ID = 420;
    const MENU_PRIMARY_SOURCE_URL = 'https://webservices-v2.crous-mobile.fr/feed/nancy.metz/externe/crous-nancy.metz.min.json';
    const MENU_FALLBACK_SOURCE_URLS = [
      'https://www.crous-lorraine.fr/restaurant/space-brabois-3/',
    ];
    // Keep fallback page sources as an array so we can add additional official pages without changing fetch logic.
    const MENU_PAGE_SOURCE_URLS = [
      ...MENU_FALLBACK_SOURCE_URLS,
    ];
    const MENU_SOURCE_PROXY_BUILDERS = [
      (sourceUrl) => `https://r.jina.ai/${sourceUrl}`,
      (sourceUrl) => `https://api.allorigins.win/raw?url=${encodeURIComponent(sourceUrl)}`,
    ];
    const MIN_MENU_ITEM_CHAR_LENGTH = 3;

    const weatherIcons = {
      0: '☀️', 1: '🌤️', 2: '🌤️', 3: '☁️',
      45: '🌫️', 48: '🌫️',
      51: '🌦️', 53: '🌦️', 55: '🌦️',
      56: '🌦️', 57: '🌦️',
      61: '🌧️', 63: '🌧️', 65: '🌧️',
      66: '🌧️', 67: '🌧️',
      71: '❄️', 73: '❄️', 75: '❄️',
      77: '❄️',
      80: '🌦️', 81: '🌦️', 82: '🌧️',
      85: '🌨️', 86: '🌨️',
      95: '⛈️', 96: '⛈️', 99: '⛈️',
    };

    const weatherDescriptions = {
      0: 'Clear sky',
      1: 'Mostly clear',
      2: 'Partly cloudy',
      3: 'Overcast',
      45: 'Foggy',
      48: 'Depositing rime fog',
      51: 'Light drizzle',
      53: 'Drizzle',
      55: 'Heavy drizzle',
      56: 'Light freezing drizzle',
      57: 'Freezing drizzle',
      61: 'Light rain',
      63: 'Rain',
      65: 'Heavy rain',
      66: 'Freezing rain',
      67: 'Heavy freezing rain',
      71: 'Light snow',
      73: 'Snow',
      75: 'Heavy snow',
      77: 'Snow grains',
      80: 'Light rain showers',
      81: 'Rain showers',
      82: 'Heavy rain showers',
      85: 'Snow showers',
      86: 'Heavy snow showers',
      95: 'Thunderstorm',
      96: 'Thunderstorm with hail',
      99: 'Severe thunderstorm',
    };

    const setIconLabel = (label) => {
      weatherIcon.setAttribute('aria-label', label);
      weatherIcon.removeAttribute('aria-hidden');
    };
    setIconLabel('Loading weather');

    /**
     * Updates the widget with the current temperature (°C) and Open-Meteo weather code.
     */
    const setWeather = (temp, code) => {
      const roundedTemp = Math.round(temp);
      weatherTemp.textContent = `${roundedTemp}°C`;
      const description = weatherDescriptions[code] || 'Unknown conditions';
      const icon = weatherIcons[code] || '⛅️';
      weatherIcon.textContent = icon;
      setIconLabel(`Weather: ${description}`);
      weatherLocation.textContent = WEATHER_LOCATION.name;
      weatherDescription.textContent = description;
      weatherWidget.classList.remove('is-muted');
    };

    const showWeatherError = () => {
      weatherLocation.textContent = WEATHER_LOCATION.name;
      weatherDescription.textContent = 'Weather unavailable';
      weatherIcon.textContent = '⚠️';
      setIconLabel('Weather unavailable');
      weatherWidget.classList.add('is-muted');
    };

    (async () => {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), WEATHER_FETCH_TIMEOUT_MILLISECONDS); // Cleared on success and again in finally for safety
      try {
        const response = await fetch(WEATHER_API_URL, {
          signal: controller.signal,
        });
        clearTimeout(timeout);
        if (!response.ok) {
          const statusText = response.statusText ? ` ${response.statusText}` : '';
          throw new Error(`Network error: ${response.status}${statusText}`);
        }
        const data = await response.json();
        if (!data.current) throw new Error('Missing current weather data');
        const temperature = data.current.temperature_2m;
        const weatherCode = data.current.weather_code;
        if (typeof temperature !== 'number') throw new Error(`Missing temperature value: received ${String(temperature)}`);
        if (typeof weatherCode !== 'number') throw new Error(`Missing weather code: received ${String(weatherCode)}`);
        setWeather(temperature, weatherCode);
      } catch (error) {
        console.error('Failed to fetch weather data', error);
        showWeatherError();
      } finally {
        clearTimeout(timeout);
      }
    })();

    const menuSubtitle = document.getElementById('menuSubtitle');
    const menuContent = document.getElementById('menuContent');

    const ALL_WEEKDAY_NAMES = new Set([
      'sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday',
      'dimanche', 'lundi', 'mardi', 'mercredi', 'jeudi', 'vendredi', 'samedi'
    ]);
    const ALLOWED_MENU_SECTION_LABELS = new Map([
      ['salle tradi pop', 'Salle Tradi Pop'],
      ['salle tradi zen', 'Salle Tradi Zen'],
    ]);
    const MENU_SKIP_PATTERNS = ['déjeuner', 'dejeuner', 'menu'];
    const WEEKEND_DAYS = ['saturday', 'sunday'];
    const MENU_CACHE_KEY = 'restaurant-checkin-menu-cache-v2';

    const normalizeText = (line) => String(line ?? '').toLowerCase().replace(/\s+/g, ' ').trim();
    const normalizeSectionName = (line) => normalizeText(String(line ?? '').replace(/[^\p{L}\p{N}\s]/gu, ' '));
    const isStructuredMenuSectionName = (name) => typeof name === 'string' && name.includes('—');
    const getMenuCacheDate = () => new Date().toLocaleDateString('en-CA', { timeZone: 'Europe/Paris' });
    const getAllowedMenuSectionLabel = (line) => {
      const normalized = normalizeSectionName(line);
      for (const [sectionName, displayLabel] of ALLOWED_MENU_SECTION_LABELS) {
        if (normalized.includes(sectionName)) return displayLabel;
      }
      return null;
    };

    const extractTextLines = (source) => source
      .replace(/\r/g, '\n')
      .split('\n')
      .map((line) => line
        .replace(/\u00a0/g, ' ')
        .trim())
      .filter(Boolean);

    const parseMenuTextLines = (source) => {
      const parser = new DOMParser();
      const parsedDocument = parser.parseFromString(source, 'text/html');
      parsedDocument.querySelectorAll('script, style, noscript').forEach((element) => element.remove());
      const rawText = parsedDocument.body ? parsedDocument.body.textContent || '' : '';
      return extractTextLines(rawText);
    };

    const getTodayNamesInParis = () => {
      const now = new Date();
      const dayEnglish = new Intl.DateTimeFormat('en-US', { weekday: 'long', timeZone: 'Europe/Paris' }).format(now).toLowerCase();
      const dayFrench = new Intl.DateTimeFormat('fr-FR', { weekday: 'long', timeZone: 'Europe/Paris' }).format(now).toLowerCase();
      return { dayEnglish, dayFrench };
    };

    const getCurrentDaySlice = (lines) => {
      const { dayEnglish, dayFrench } = getTodayNamesInParis();
      const currentIndex = lines.findIndex((line) => {
        const normalized = normalizeText(line);
        return normalized.includes(dayEnglish) || normalized.includes(dayFrench);
      });
      if (currentIndex === -1) return [];

      let endIndex = lines.length;
      for (let i = currentIndex + 1; i < lines.length; i += 1) {
        const normalized = normalizeText(lines[i]);
        if ([...ALL_WEEKDAY_NAMES].some((name) => normalized.includes(name))) {
          endIndex = i;
          break;
        }
      }
      return lines.slice(currentIndex, endIndex);
    };

    const getSectionsFromLines = (lines) => {
      const sections = [];
      let currentSection = null;

      lines.forEach((line) => {
        const normalized = normalizeText(line);
        if (!normalized || ALL_WEEKDAY_NAMES.has(normalized)) return;

        const allowedSectionLabel = getAllowedMenuSectionLabel(line);
        if (allowedSectionLabel) {
          currentSection = { name: allowedSectionLabel, items: [] };
          sections.push(currentSection);
          return;
        }

        if (MENU_SKIP_PATTERNS.some((pattern) => normalized.includes(pattern))) return;
        if (line.length <= MIN_MENU_ITEM_CHAR_LENGTH) return;
        if (currentSection) {
          currentSection.items.push(line);
        }
      });

      return sections.filter((section) => section.items.length > 0);
    };

    const getCurrentDayLinesOrAll = (allLines) => {
      const currentDayLines = getCurrentDaySlice(allLines);
      return currentDayLines.length > 0 ? currentDayLines : allLines;
    };

    const renderMenuUnavailable = (reasonText) => {
      menuSubtitle.textContent = reasonText;
      menuContent.className = 'menu-empty';
      menuContent.textContent = 'No available data today.';
    };

    const renderMenu = (sections) => {
      menuSubtitle.textContent = MENU_DISPLAY_NAME;
      menuContent.className = '';
      menuContent.innerHTML = '';

      sections.forEach((section) => {
        const container = document.createElement('section');
        container.className = 'menu-section';

        const title = document.createElement('h3');
        title.textContent = section.name;
        container.appendChild(title);

        const list = document.createElement('ul');
        list.className = 'menu-items';
        section.items.forEach((item) => {
          const li = document.createElement('li');
          li.textContent = item;
          list.appendChild(li);
        });
        container.appendChild(list);
        menuContent.appendChild(container);
      });
    };

    const MENU_PRIMARY_SOURCE_CANDIDATES = [
      MENU_PRIMARY_SOURCE_URL,
      ...MENU_SOURCE_PROXY_BUILDERS.map((buildProxyUrl) => buildProxyUrl(MENU_PRIMARY_SOURCE_URL)),
    ];
    const MENU_PAGE_SOURCE_CANDIDATES = [
      ...MENU_PAGE_SOURCE_URLS,
      ...MENU_SOURCE_PROXY_BUILDERS.flatMap((buildProxyUrl) => MENU_PAGE_SOURCE_URLS.map((sourceUrl) => buildProxyUrl(sourceUrl))),
    ];

    const fetchMenuSourceFromUrl = async (sourceUrl) => {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), MENU_FETCH_TIMEOUT_MILLISECONDS);
      try {
        const response = await fetch(sourceUrl, { signal: controller.signal });
        if (!response.ok) return null;
        const text = await response.text();
        return text && text.trim().length > 0 ? text : null;
      } catch (error) {
        const reason = error instanceof Error ? error.message : String(error);
        console.error(`Failed to fetch menu source from ${sourceUrl}: ${reason}`);
        return null;
      } finally {
        clearTimeout(timeout);
      }
    };

    const getCachedMenuSections = () => {
      try {
        const cachedValue = localStorage.getItem(MENU_CACHE_KEY);
        if (!cachedValue) return [];
        const parsed = JSON.parse(cachedValue);
        if (parsed?.date !== getMenuCacheDate() || !Array.isArray(parsed?.sections)) return [];
        return parsed.sections.filter((section) =>
          typeof section?.name === 'string'
          && (
            ALLOWED_MENU_SECTION_LABELS.has(normalizeSectionName(section.name))
            || isStructuredMenuSectionName(section.name)
          )
          && Array.isArray(section?.items)
          && section.items.length > 0
        );
      } catch {
        return [];
      }
    };

    const cacheMenuSections = (sections) => {
      try {
        localStorage.setItem(MENU_CACHE_KEY, JSON.stringify({ date: getMenuCacheDate(), sections }));
      } catch {
        // Ignore localStorage failures to keep rendering resilient
      }
    };

    const fetchFirstMenuSourceFromCandidates = async (candidates) => {
      if (candidates.length === 0) return null;
      return new Promise((resolve) => {
        let completedRequests = 0;
        let settled = false;
        candidates.forEach((sourceUrl) => {
          fetchMenuSourceFromUrl(sourceUrl)
            .then((text) => {
              if (settled || !text) return;
              settled = true;
              resolve(text);
            })
            .finally(() => {
              completedRequests += 1;
              if (!settled && completedRequests === candidates.length) resolve(null);
            });
        });
      });
    };

    const fetchMenuSource = async () => {
      const primarySourceText = await fetchFirstMenuSourceFromCandidates(MENU_PRIMARY_SOURCE_CANDIDATES);
      if (primarySourceText) return primarySourceText;
      return fetchFirstMenuSourceFromCandidates(MENU_PAGE_SOURCE_CANDIDATES);
    };

    const getStructuredItems = (dish) => {
      if (typeof dish?.name === 'string') return [dish.name];
      if (typeof dish === 'string') return [dish];
      if (Array.isArray(dish?.items)) return dish.items.filter((item) => typeof item === 'string');
      return [];
    };

    const parseStructuredMenuSections = (sourceText) => {
      try {
        const parsed = JSON.parse(sourceText);
        if (!Array.isArray(parsed?.restaurants)) return [];

        const braboisRestaurant = parsed.restaurants.find((restaurant) => {
          if (Number(restaurant?.id) === MENU_RESTAURANT_ID) return true;
          const normalizedTitle = normalizeText(restaurant?.title);
          return normalizedTitle.includes('space') && normalizedTitle.includes('brabois');
        });
        if (!braboisRestaurant || !Array.isArray(braboisRestaurant?.menus)) return [];

        const todayDate = getMenuCacheDate();
        const todayMenus = braboisRestaurant.menus.filter((menu) => String(menu?.date || '').slice(0, 10) === todayDate);
        if (todayMenus.length === 0) return [];

        const sections = [];
        todayMenus.forEach((menu) => {
          const mealEntries = Array.isArray(menu?.meal) ? menu.meal : (Array.isArray(menu?.meals) ? menu.meals : []);
          mealEntries.forEach((meal) => {
            const mealName = typeof meal?.name === 'string' ? meal.name.trim() : 'Menu';
            const categoryEntries = Array.isArray(meal?.foodcategory) ? meal.foodcategory : (Array.isArray(meal?.plats) ? meal.plats : []);
            categoryEntries.forEach((category) => {
              const categoryName = typeof category?.name === 'string' ? category.name.trim() : '';
              const sectionName = categoryName ? `${mealName} — ${categoryName}` : mealName;
              const dishEntries = Array.isArray(category?.dishes) ? category.dishes : [];
              const items = dishEntries
                .flatMap(getStructuredItems)
                .map((dishName) => dishName.trim())
                .filter((dishName) => dishName.length > MIN_MENU_ITEM_CHAR_LENGTH);
              if (items.length > 0) sections.push({ name: sectionName, items });
            });
          });
        });
        return sections;
      } catch {
        return [];
      }
    };

    (async () => {
      const { dayEnglish } = getTodayNamesInParis();
      if (WEEKEND_DAYS.includes(dayEnglish)) {
        renderMenuUnavailable('Weekend');
        return;
      }

      const cachedSections = getCachedMenuSections();
      if (cachedSections.length > 0) {
        renderMenu(cachedSections);
        return;
      }

      const sourceText = await fetchMenuSource();
      if (!sourceText) {
        renderMenuUnavailable('Menu source unavailable');
        return;
      }

      const structuredSections = parseStructuredMenuSections(sourceText);
      const sections = structuredSections.length > 0
        ? structuredSections
        : getSectionsFromLines(getCurrentDayLinesOrAll(parseMenuTextLines(sourceText)));

      if (sections.length === 0) {
        renderMenuUnavailable('No lunch menu published yet');
        return;
      }
      cacheMenuSections(sections);
      renderMenu(sections);
    })();

    const nameInput    = document.getElementById('nameInput');
    const nameList     = document.getElementById('nameList');
    const submitButton = document.getElementById('submitButton');
    const listRef      = ref(database, 'restaurant-checkin/' + today);

    // ── Participant list ──
    const addNameToList = (name, key) => {
      const li = document.createElement('li');
      li.dataset.key = key;

      const span = document.createElement('span');
      span.textContent = name;

      const removeBtn = document.createElement('button');
      removeBtn.textContent = 'Remove';
      removeBtn.className = 'remove-button';
      removeBtn.addEventListener('click', () => {
        if (confirm('Remove your name?')) {
          remove(ref(database, 'restaurant-checkin/' + today + '/' + key));
        }
      });

      li.appendChild(span);
      li.appendChild(removeBtn);
      nameList.appendChild(li);
    };

    onChildAdded(listRef, (snapshot) => addNameToList(snapshot.val(), snapshot.key));

    onChildRemoved(listRef, (snapshot) => {
      const li = nameList.querySelector(`li[data-key='${snapshot.key}']`);
      if (li) li.remove();
    });

    const submitName = () => {
      const name = nameInput.value.trim();
      if (name) {
        push(listRef, name);
        nameInput.value = '';
      }
    };

    submitButton.addEventListener('click', submitName);
    nameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') submitName(); });
  </script>
</body>
</html>
